# src/configs/model/multimodal_moe.yaml

_target_: src.model.Multimodal_MoE.MultimodalModel

# ---- 融合模块 ----
fusion_embed_dim:   512
fusion_output_dim:  512
fusion_heads:       8
fusion_layers:      2
ff_multiplier:      4
dropout:            0.1
num_classes:        5

# ---- 分支（null 表示使用默认子模块）----
time_branch:         null
spectrogram_branch:  null
# text_branch 配置示例（本地 CLAP 模型）：
text_branch:
  _target_: src.model.Multimodal_MoE.ClapTextBranch
  pretrained_model_name: "X:/数据集/Research_Project/Zero-Shot_Project/clap-htsat-unfused"
  local_files_only: true
  target_dim: 512

# text_branch:         null

# ---- MoE 分类器参数 ----
classifier_kwargs:
  expert_num:   8
  top_k:        3
  balance_wt:   0.01