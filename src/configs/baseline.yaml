# src/configs/baseline.yaml

defaults:
  - _self_
  - model: multimodal_moe
  - datasets: shipear
  - trainer: train
  - inferencer: infer

hydra:
  run:
    dir: .
  output_subdir: null          # 不生成 .hydra/ 目录
  job_logging:
    version: 1
    disable_existing_loggers: false
    formatters:
      simple:
        format: "%(message)s"
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:                    # 覆盖默认 file handler，阻止生成 train.log
        class: logging.NullHandler
    root:
      level: INFO
      handlers: [console]
  hydra_logging:
    version: 1
    disable_existing_loggers: false
    handlers:
      console:
        class: logging.StreamHandler
        stream: ext://sys.stdout
      file:                    # 覆盖默认 file handler，阻止生成 hydra.log
        class: logging.NullHandler
    root:
      level: WARNING
      handlers: [console]

# WandB writer
writer:
  _target_: src.logger.WandBWriter
  project: ShipEar-Multimodal-Classification
  entity: null
  enabled: false    # 设为 true 开启 WandB 上传